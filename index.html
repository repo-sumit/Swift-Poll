<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>Swift Poll - Quick pulse-check</title>
  <meta name="description" content="Swift Poll: fast, mobile-first polling. Answer one question at a time and see live results." />
  <link rel="icon" href="https://i.ibb.co/LDdkBqsS/image-4.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="sp-body">
  <header class="sp-header">
    <a href="index.html" class="sp-header__brand" aria-label="Swift Poll home">
      <img data-brand-logo alt="Swift Poll" class="sp-header__logo" />
      <span class="sp-header__name" data-brand-name>Swift Poll</span>
    </a>
    <nav class="sp-header__nav" aria-label="Primary">
      <a href="dashboard.html" class="sp-link">Dashboard</a>
    </nav>
  </header>

  <main class="sp-main">
    <section class="sp-hero" aria-labelledby="hero-title">
      <img data-brand-logo alt="" class="sp-hero__logo" />
      <h1 id="hero-title" class="sp-hero__title">
        <span data-brand-name>Swift Poll</span>
      </h1>
      <p class="sp-hero__subtitle" data-poll-intro>
        A quick pulse-check. Answer honestly - it takes under a minute.
      </p>

      <article class="sp-card sp-card--hero" aria-label="How it works">
        <h2 class="sp-card__title">How it works</h2>
        <ol class="sp-steps">
          <li>
            <span class="sp-steps__n">1</span>
            <span>Type your name.</span>
          </li>
          <li>
            <span class="sp-steps__n">2</span>
            <span>Pick one answer for each question.</span>
          </li>
          <li>
            <span class="sp-steps__n">3</span>
            <span>Tap <strong>Submit</strong> at the end. Done!</span>
          </li>
        </ol>
      </article>

      <div class="sp-cta-row sp-cta-row--solo">
        <button class="sp-btn sp-btn--primary sp-btn--xl" type="button" data-cta="start">
          Start Poll
          <span aria-hidden="true" class="sp-btn__arrow">&rarr;</span>
        </button>
      </div>
    </section>
  </main>

  <footer class="sp-footer">
    <span class="sp-credit">
      Built with <span class="sp-credit__heart" aria-hidden="true">&#10084;&#65039;</span>
      <span class="sp-visually-hidden">love</span>
      by
      <a href="https://www.linkedin.com/in/in-sumit/" target="_blank" rel="noopener noreferrer"
         class="sp-credit__link">Sumit</a>
    </span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="js/config.js?v=2"></script>
  <script src="js/utils.js?v=2"></script>
  <script src="js/supabase.js?v=2"></script>
  <script src="js/main.js?v=2"></script>
</body>
</html>
